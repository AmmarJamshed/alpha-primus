name: Bi-Weekly Provider Sync

on:
  schedule:
    # 1st and 15th of each month at 06:00 UTC (~every two weeks)
    - cron: "0 6 1,15 * *"
  workflow_dispatch:
    inputs:
      npi_per_state:
        description: "NPI providers per launch state"
        required: false
        default: "100"
      osm_per_state:
        description: "OpenStreetMap providers per launch state"
        required: false
        default: "25"

permissions:
  contents: write

jobs:
  sync-providers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync providers from NPI + OpenStreetMap
        run: |
          node scripts/sync-providers.mjs \
            --npi-per-state=${{ github.event.inputs.npi_per_state || '100' }} \
            --osm-per-state=${{ github.event.inputs.osm_per_state || '25' }}

      - name: Upload sync report
        uses: actions/upload-artifact@v4
        with:
          name: provider-sync-report
          path: scripts/discovery/output/sync-report.json

      - name: Commit and push updated provider data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/providers.json scripts/discovery/output/sync-report.json
          if git diff --staged --quiet; then
            echo "No provider changes detected."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
chore: bi-weekly provider sync from NPI and OpenStreetMap

Automated refresh adds new listings and removes stale/expired providers not seen in 28 days.
EOF
)"
          git push
